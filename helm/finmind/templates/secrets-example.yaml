{{/*
This is an EXAMPLE secret template.
In production, use external-secrets, sealed-secrets, or create manually.

To create manually:
kubectl create secret generic finmind-secrets \
  --namespace=finmind \
  --from-literal=POSTGRES_USER=finmind \
