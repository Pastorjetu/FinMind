apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "finmind.fullname" . }}-config
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "finmind.labels" . | nindent 4 }}
data:
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  GEMINI_MODEL: {{ .Values.config.geminiModel | quote }}
  REDIS_URL: {{ include "finmind.redisUrl" . | quote }}
  {{- if .Values.config.apiUrl }}
  VITE_API_URL: {{ .Values.config.apiUrl | quote }}
  {{- end }}
