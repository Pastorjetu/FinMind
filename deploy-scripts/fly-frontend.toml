# ============================================================================
# Fly.io Configuration - FinMind Frontend
# ============================================================================
# Deploy:
#   1. fly apps create finmind-frontend
#   2. fly deploy -c fly-frontend.toml
# ============================================================================

app = "finmind-frontend"
primary_region = "iad"

[build]
  dockerfile = "app/Dockerfile"

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 500
    soft_limit = 400

[[http_service.checks]]
  grace_period = "5s"
  interval = "30s"
  method = "GET"
  path = "/"
  timeout = "3s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
