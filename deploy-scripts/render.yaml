# ============================================================================
# Render Blueprint - FinMind Full Stack Deployment
# ============================================================================
# Deploy: Push this file to your repo, then connect via Render dashboard
# Docs: https://render.com/docs/blueprint-spec
# ============================================================================

services:
  # -------------------------------------------------------------------------
  # Backend API (Flask)
  # -------------------------------------------------------------------------
  - type: web
    name: finmind-backend
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r packages/backend/requirements.txt
    startCommand: |
      cd packages/backend && 
      python -m flask --app wsgi:app init-db &&
      gunicorn --workers=2 --threads=4 --bind 0.0.0.0:$PORT wsgi:app
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: finmind-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: finmind-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: LOG_LEVEL
        value: INFO
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
    autoDeploy: true

  # -------------------------------------------------------------------------
  # Frontend (React + Vite)
  # -------------------------------------------------------------------------
  - type: web
    name: finmind-frontend
    runtime: static
    region: oregon
    plan: free
    buildCommand: cd app && npm ci && npm run build
    staticPublishPath: app/dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: finmind-backend
          type: web
          property: host
          prefix: https://
    autoDeploy: true

  # -------------------------------------------------------------------------
  # Redis Cache
  # -------------------------------------------------------------------------
  - type: redis
    name: finmind-redis
    region: oregon
    plan: free
    maxmemoryPolicy: allkeys-lru

# ---------------------------------------------------------------------------
# PostgreSQL Database
# ---------------------------------------------------------------------------
databases:
  - name: finmind-db
    region: oregon
    plan: free
    databaseName: finmind
    user: finmind
