# ============================================================================
# Fly.io Configuration - FinMind Backend
# ============================================================================
# Deploy:
#   1. fly auth login
#   2. fly apps create finmind-backend
#   3. fly postgres create --name finmind-db
#   4. fly redis create --name finmind-redis
#   5. fly secrets set JWT_SECRET=$(openssl rand -hex 32)
#   6. fly deploy -c fly-backend.toml
# ============================================================================

app = "finmind-backend"
primary_region = "iad"

[build]
  dockerfile = "packages/backend/Dockerfile"

[env]
  LOG_LEVEL = "INFO"
  GEMINI_MODEL = "gemini-1.5-flash"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/health"
  timeout = "5s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

[deploy]
  release_command = "python -m flask --app wsgi:app init-db"
