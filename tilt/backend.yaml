apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: finmind-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: finmind-backend
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: finmind-secrets
          env:
            - name: DATABASE_URL
              value: postgresql+psycopg2://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_DB)
            - name: REDIS_URL
              value: redis://redis:6379/0
            - name: LOG_LEVEL
              value: DEBUG
            - name: PROMETHEUS_MULTIPROC_DIR
              value: /tmp/prometheus_multiproc
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: finmind-dev
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
